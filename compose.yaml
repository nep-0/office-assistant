services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Containerfile
    depends_on:
      - backend
    ports:
      - "8080:80"

  backend:
    build:
      context: .
      dockerfile: backend/Containerfile
    environment:
      BACKEND_ADDR: ":8080"
      STORAGE_ROOT: "/data/files"
      DOCUMENT_URL: "http://document:8081"
      OCR_URL: "http://ocr:8082"
      CHAT_REQUEST_TIMEOUT: "10m"
      FAKE_PROVIDERS: "false"
      CHAT_PROVIDER_BASE_URL: "http://llm:8083/v1"
      CHAT_MODEL: "local-chat"
      CHAT_API_KEY: ""
      EMBEDDING_PROVIDER_BASE_URL: "http://embedding:8084/v1"
      EMBEDDING_MODEL: "local-embedding"
      EMBEDDING_API_KEY: ""
    depends_on:
      - document
      - ocr
    volumes:
      - backend-data:/data

  document:
    build:
      context: .
      dockerfile: document/Containerfile
    environment:
      DOCUMENT_PORT: "8081"
      OCR_URL: "http://ocr:8082"
    read_only: true
    tmpfs:
      - /tmp

  ocr:
    build:
      context: .
      dockerfile: ocr/Containerfile
    environment:
      OCR_PORT: "8082"
      PADDLEOCR_DEVICE: "cpu"
    read_only: true
    tmpfs:
      - /tmp

  llm:
    image: "ghcr.io/ggml-org/llama.cpp:server-b9717"
    command:
      - "-m"
      - "/models/Qwen3.5-0.8B-Q4_K_M.gguf"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8083"
    volumes:
      - "/home/jeff/models:/models:ro"

  embedding:
    image: "ghcr.io/ggml-org/llama.cpp:server-b9717"
    command:
      - "-m"
      - "/models/embeddinggemma-300m-qat-Q8_0.gguf"
      - "--embedding"
      - "--ubatch-size" 
      - "1024"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8084"
    volumes:
      - "/home/jeff/models:/models:ro"

volumes:
  backend-data:
